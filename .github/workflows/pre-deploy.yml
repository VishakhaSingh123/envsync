name: 🚀 Pre-Deploy Preflight

on:
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
        description: 'Environment being deployed to (staging | production)'
      drift_threshold:
        required: false
        type: number
        default: 0
        description: 'Max allowed drift count. 0 = zero tolerance.'
    secrets:
      ENVSYNC_KEY:
        required: true

  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      drift_threshold:
        description: 'Max allowed drift (0 = block all drift)'
        required: false
        default: '0'

jobs:
  preflight:
    name: 🛫 Preflight — ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐹 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: 🔨 Build envsync
        run: go build -o envsync ./...

      - name: 🔐 Set encryption key
        run: echo "ENVSYNC_KEY=${{ secrets.ENVSYNC_KEY }}" >> $GITHUB_ENV

      - name: ✅ Runtime Version Validation
        run: |
          echo "::group::Runtime Validation"
          ./envsync validate --env ${{ inputs.target_env }} || true
          echo "::endgroup::"

      - name: 🔍 Audit Environment
        id: audit
        run: |
          THRESHOLD="${{ inputs.drift_threshold }}"
          THRESHOLD="${THRESHOLD:-0}"

          echo "::group::Audit ${{ inputs.target_env }}"
          ./envsync audit \
            --env ${{ inputs.target_env }} \
            --fail-on-missing \
            --threshold $THRESHOLD
          AUDIT_CODE=$?
          echo "audit_code=$AUDIT_CODE" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: 📸 Auto-Snapshot Before Deploy
        if: steps.audit.outputs.audit_code == '0'
        run: |
          echo "::group::Creating snapshot of ${{ inputs.target_env }}"
          ./envsync snapshot create ${{ inputs.target_env }}
          echo "::endgroup::"

      - name: 🚨 Block Deploy on Failure
        if: steps.audit.outputs.audit_code != '0'
        run: |
          echo "::error::Pre-flight FAILED for ${{ inputs.target_env }}."
          echo "::error::Fix missing or misconfigured environment variables before deploying."
          exit 1

      - name: ✅ Preflight Passed
        if: steps.audit.outputs.audit_code == '0'
        run: |
          echo "::notice::✅ Pre-flight checks passed for ${{ inputs.target_env }}. Safe to deploy!"
