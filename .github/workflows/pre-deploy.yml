name: Pre-Deploy Check

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  pre-deploy:
    name: Pre-Deploy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build EnvSync
        run: go mod tidy && go build -o envsync .

      - name: Write env files
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
          ENV_STAGING: ${{ secrets.ENV_STAGING }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          [ -n "$ENV_DEV" ]        && echo "$ENV_DEV"        > .env.dev        || true
          [ -n "$ENV_STAGING" ]    && echo "$ENV_STAGING"    > .env.staging    || true
          [ -n "$ENV_PRODUCTION" ] && echo "$ENV_PRODUCTION" > .env.production || true

      - name: Snapshot before deploy
        run: ./envsync snapshot create ${{ inputs.target_env }} || true
        env:
          ENVSYNC_KEY: ${{ secrets.ENVSYNC_KEY }}

      - name: Audit target environment
        run: ./envsync audit --env ${{ inputs.target_env }} || true
        env:
          ENVSYNC_KEY: ${{ secrets.ENVSYNC_KEY }}

      - name: Drift check
        run: ./envsync diff dev ${{ inputs.target_env }} || true
        env:
          ENVSYNC_KEY: ${{ secrets.ENVSYNC_KEY }}
