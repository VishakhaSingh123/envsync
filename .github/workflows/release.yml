name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version e.g. v1.0.0'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install dependencies
        run: go mod tidy

      - name: Build for Linux
        run: GOOS=linux GOARCH=amd64 go build -o dist/envsync-linux-amd64 .

      - name: Build for macOS
        run: GOOS=darwin GOARCH=amd64 go build -o dist/envsync-darwin-amd64 .

      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o dist/envsync-windows-amd64.exe .

      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ inputs.version }}
          path: dist/
          retention-days: 90
