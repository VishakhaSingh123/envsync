name: EnvSync CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install dependencies
        run: go mod tidy

      - name: Build binary
        run: go build -o envsync .

      - name: Verify binary works
        run: ./envsync --help

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: envsync-binary
          path: envsync
          retention-days: 1

  audit:
    name: Audit Environments
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: envsync-binary

      - run: chmod +x ./envsync

      - name: Write env files
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
          ENV_STAGING: ${{ secrets.ENV_STAGING }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          [ -n "$ENV_DEV" ]        && echo "$ENV_DEV"        > .env.dev        || true
          [ -n "$ENV_STAGING" ]    && echo "$ENV_STAGING"    > .env.staging    || true
          [ -n "$ENV_PRODUCTION" ] && echo "$ENV_PRODUCTION" > .env.production || true

      - name: Audit dev
        run: ./envsync audit --env dev || true
        env:
          ENVSYNC_KEY: ${{ secrets.ENVSYNC_KEY }}

      - name: Audit staging
        run: ./envsync audit --env staging || true
        env:
          ENVSYNC_KEY: ${{ secrets.ENVSYNC_KEY }}

      - name: Diff dev vs staging
        run: ./envsync diff dev staging || true
        env:
          ENVSYNC_KEY: ${{ secrets.ENVSYNC_KEY }}

  validate:
    name: Validate Runtimes
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: envsync-binary

      - run: chmod +x ./envsync

      - name: Check runtime versions
        run: ./envsync validate --env dev || true