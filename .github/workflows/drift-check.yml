name: Drift Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  drift:
    name: Check Drift dev to staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        run: go mod tidy && go build -o envsync .

      - name: Write env files
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
          ENV_STAGING: ${{ secrets.ENV_STAGING }}
        run: |
          [ -n "$ENV_DEV" ]     && echo "$ENV_DEV"     > .env.dev     || true
          [ -n "$ENV_STAGING" ] && echo "$ENV_STAGING" > .env.staging || true

      - name: Run drift check
        run: ./envsync diff dev staging || true
        env:
          ENVSYNC_KEY: ${{ secrets.ENVSYNC_KEY }}

      - name: Audit staging
        run: ./envsync audit --env staging || true
        env:
          ENVSYNC_KEY: ${{ secrets.ENVSYNC_KEY }}
