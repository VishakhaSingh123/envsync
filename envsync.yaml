# envsync.yaml
version: "1"
source_of_truth: .env.example

environments:
  dev:
    type: file
    path: .env.dev
    format: dotenv
  staging:
    type: file
    path: .env.staging
    format: dotenv
  production:
    type: file
    path: .env.production
    format: dotenv

runtimes:
  node: "20"
  python: "3.11"

secrets:
  encryption_key_env: ENVSYNC_KEY
  redacted_keys:
    - PASSWORD
    - SECRET
    - TOKEN
    - KEY
    - PRIVATE

snapshots:
  directory: .envsync/snapshots
  max_keep: 10
  encrypted: true
